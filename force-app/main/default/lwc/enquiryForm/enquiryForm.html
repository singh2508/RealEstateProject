<template>
    <section class="hero">

        <div class="overlay">

            <h1>Find Your Dream Home</h1>

            <p>Luxury Apartments With World Class Amenities</p>

            <lightning-button
                label="Enquiry Now"
                variant="brand"
                onclick={openModal}>
            </lightning-button>

        </div>

    </section>
<template if:true={isLoading}>
    <lightning-spinner alternative-text="Saving"></lightning-spinner>
</template>
    <!-- Modal -->
    <template if:true={showModal}>

        <section class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">

                    <h2 class="slds-text-heading_medium">
                        Enquiry Form
                    </h2>

                </header>

                <div class="slds-modal__content">

<lightning-input
    label="Full Name"
    name="fullName"
    value={formData.fullName}
    required
    onchange={handleChange}>
</lightning-input>

        <lightning-input
            type="email"
            label="Email"
            name="email"
            value={formData.email}
            required
            onchange={handleChange}>
        </lightning-input>

<lightning-input
    type="tel"
    label="Phone"
    name="phone"
    value={formData.phone}
    required
    onchange={handleChange}>
</lightning-input>

<lightning-input
    label="City"
    name="city"
    value={formData.city}
    required
    onchange={handleChange}>
</lightning-input>

 <lightning-textarea
    label="Requirement"
    name="requirement"
    value={formData.requirement}
    onchange={handleChange}>
</lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Submit"
                        onclick={handleSubmit}
                        disabled={isLoading}>
                   </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
